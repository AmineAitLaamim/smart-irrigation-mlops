
# =============================================================================
# Smart Irrigation System — Base Infrastructure
# Owner: DevOps (DO-01)
# Services: timescaledb, redis, mlflow, minio
# All other compose files depend on this one being healthy first.
# Usage: docker compose -f docker/docker-compose.yml up -d
# =============================================================================

networks:
  irrigation_net:
    name: irrigation_net
    driver: bridge

volumes:
  timescaledb_data:
  redis_data:
  minio_data:
  mlflow_data:

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB — primary time-series data store
  # Owns: sensor_readings, irrigation_events, zones, users, predictions
  # Port 5432 exposed to host for local DB clients (e.g. psql, DBeaver)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      INGESTION_PASSWORD: ${INGESTION_PASSWORD}
      READER_PASSWORD: ${READER_PASSWORD}
      APP_PASSWORD: ${APP_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - irrigation_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 — message broker (Pub/Sub) + cache
  # Used for: sensor data pipeline, JWT blacklist, rate limiting counters
  # AOF persistence enabled; max memory 256mb with allkeys-lru eviction
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - irrigation_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Used by MLflow to store model artifacts and experiment files
  # Console UI available at http://localhost:9001
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file: ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - irrigation_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # MLflow — ML experiment tracking + model registry
  # Artifacts stored in MinIO (S3-compatible backend)
  # Model server loads production model from this registry at startup
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: unless-stopped
    env_file: ../.env
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --backend-store-uri ${DATABASE_URL}
      --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET}/
      --host 0.0.0.0
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - irrigation_net
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
