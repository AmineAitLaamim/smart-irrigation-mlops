global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "model-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["model-server:8501"]

  - job_name: "drift-monitor"
    metrics_path: /metrics
    static_configs:
      - targets: ["drift-monitor:8502"]

  - job_name: "irrigation-controller"
    metrics_path: /metrics
    static_configs:
      - targets: ["irrigation-controller:8503"]

  - job_name: "feature-engineering"
    metrics_path: /health
    static_configs:
      - targets: ["feature-engineering:8004"]
