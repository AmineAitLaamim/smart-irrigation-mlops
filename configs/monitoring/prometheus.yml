global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: smart-irrigation

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:5005

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-service:8505

  - job_name: data-ingestion
    metrics_path: /metrics
    static_configs:
      - targets:
          - data-ingestion:8001

  - job_name: feature-engineering
    metrics_path: /metrics
    static_configs:
      - targets:
          - feature-engineering:8004

  - job_name: data-quality
    metrics_path: /metrics
    static_configs:
      - targets:
          - data-quality:8005

  - job_name: model-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - model-server:8501

  - job_name: drift-monitor
    metrics_path: /metrics
    static_configs:
      - targets:
          - drift-monitor:8502

  - job_name: irrigation-controller
    metrics_path: /metrics
    static_configs:
      - targets:
          - irrigation-controller:8503
